services:
  web:
    build: .
    container_name: django_web
    command: gunicorn --config gunicorn.conf.py mongyurok.asgi:application
    volumes:
      - .:/code
    env_file:
      - .env
    expose:
      - '8000'

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - '8080:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./static:/code/static
      - ./media:/code/media
    depends_on:
      - web