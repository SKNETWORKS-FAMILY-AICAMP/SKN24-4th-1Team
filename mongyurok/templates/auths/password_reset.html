{% extends 'base.html' %}
{% load static %}

{% block title %}비밀번호 재설정 | 몽유록{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/components/auths/password_reset.css' %}">
{% endblock %}

{% block content %}
<section class="password-reset-page">
    <div class="password-reset-box">
        <h2 class="password-reset-title">비밀번호 재설정</h2>

        <form method="post" class="password-reset-form">
            {% csrf_token %}

            <div class="password-reset-field">
                <label for="new-password">새 비밀번호</label>
                <input
                    type="password"
                    id="new-password"
                    name="new_password"
                    class="password-reset-input"
                    placeholder="비밀번호를 입력해주세요"
                >
            </div>

            <div class="password-reset-field">
                <label for="confirm-password">비밀번호 확인</label>
                <input
                    type="password"
                    id="confirm-password"
                    name="confirm_password"
                    class="password-reset-input"
                    placeholder="비밀번호를 재입력해주세요"
                >
            </div>

            <button type="submit" class="password-reset-button">
                확인
            </button>
        </form>
    </div>
</section>
{% endblock %}
